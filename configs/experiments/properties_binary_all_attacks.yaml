experiment:
  name: properties_binary_all_attacks_ciciot2023_to_cicids2017
  method: properties
  task: binary
  seed: 42

data:
  train_path: data/ciciot2023_preprocessed.tsv
  cross_eval_path: data/cicids2017_preprocessed.tsv
  labels: [BENIGN, ATTACK]
  attack_source_labels: [DOS_HTTP_FLOOD, PORTSCAN, DDOS_SYN_FLOOD, DDOS_UDP_FLOOD, ATTACK]
  test_size: 0.3
  val_size: 0.2

model:
  type: mlp
  batch_size: 2048
  learning_rate: 0.001
  epochs: 20
  patience: 5
  min_delta: 0.0001

properties:
  logic: dl2
  lambda_dos: 1.0
  lambda_scan: 1.0
  pgd_steps: 5
  pgd_restarts: 1
  pgd_step_size: 0.01
  trainable_features: [duration, orig_bytes, resp_bytes, missed_bytes, orig_pkts, orig_ip_bytes, resp_pkts, resp_ip_bytes, orig_pkt_rate, orig_byte_rate, time_elapsed, valid_tcp_handshake, valid_http_conn, uniq_dst_ports, pkts_per_port, scan_duration, fail_ratio]
  frozen_features: [valid_tcp_handshake, valid_http_conn, time_elapsed, orig_byte_rate, orig_pkt_rate, uniq_dst_ports, pkts_per_port, scan_duration, fail_ratio]

attack_specs:
  dos_http_flood:
    valid_packet_size_individual_min: 40.0
    mal_time_elapsed_min: 0.0
    mal_time_elapsed_max: 120.0
    valid_pkt_size_total_min: 250
    mal_byte_rate_min: 200.0
    mal_pkt_rate_min: 5.0
  portscan:
    mal_uniq_dst_ports_min: 20.0
    mal_pkts_per_port_max: 10.0
    mal_scan_duration_max: 5.0
    mal_fail_ratio_min: 0.75

preconditions:
  default:
    name: GlobalBounds
    params:
      lower_bound: 0.0
      upper_bound: 1.0

output:
  root: outputs/runs
