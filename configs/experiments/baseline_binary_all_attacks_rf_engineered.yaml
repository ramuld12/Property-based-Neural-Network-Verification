experiment:
  name: baseline_binary_all_attacks_rf_engineered_ciciot2023_to_cicids2017
  method: baseline
  task: binary
  seed: 42

data:
  train_path: data/ciciot2023_preprocessed.tsv
  cross_eval_path: data/cicids2017_preprocessed.tsv
  labels: [BENIGN, ATTACK]
  attack_source_labels: [DOS_HTTP_FLOOD, PORTSCAN, DDOS_SYN_FLOOD, DDOS_UDP_FLOOD, ATTACK]
  test_size: 0.3
  val_size: 0.2

features:
  set: engineered
  categorical: [proto, service, conn_state, history]
  numeric:
    - duration
    - orig_bytes
    - resp_bytes
    - missed_bytes
    - orig_pkts
    - orig_ip_bytes
    - resp_pkts
    - resp_ip_bytes
  engineered:
    - time_elapsed
    - valid_tcp_handshake
    - valid_http_conn
    - uniq_dst_ports
    - scan_duration
    - fail_ratio

model:
  type: random_forest
  n_estimators: 100
  n_jobs: 1
  batch_size: 2048
  learning_rate: 0.001
  epochs: 20
  patience: 5
  min_delta: 0.0001

output:
  root: outputs/runs
