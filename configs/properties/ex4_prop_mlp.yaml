experiment:
  name: properties_multiclass_cicids2017_to_ciciot2023
  task: multiclass
  seed: 42

data:
  train_path: data/cicids2017_preprocessed.tsv
  cross_eval_path: 
    - data/ciciot2023_preprocessed_small_good.tsv
    - data/ciciot2023_preprocessed_small_bad.tsv
  labels: [BENIGN, DOS_HTTP_FLOOD, PORTSCAN, ATTACK]
  attack_source_labels: [XSS, SQL_INJECTION, BRUTE_FORCE]
  test_size: 0.3
  val_size: 0.2
  windows_seconds: 5.0

model:
  type: mlp
  batch_size: 2048
  learning_rate: 0.001
  epochs: 40
  patience: 10
  min_epochs: 10
  min_delta: 0.00001

properties:
  logic: dl2
  lambda_dos: 0.25
  lambda_scan: 0.25
  pgd_steps: 10
  pgd_restarts: 1
  pgd_step_size: 0.01

attack_specs:
  dos_http_flood:
    valid_packet_size_individual_min: 40.0
    valid_pkt_size_total_min: 250
    mal_time_elapsed_min: 0.00000000001
    mal_time_elapsed_max: 0.5
  portscan:
    mal_uniq_dst_ports_min: 100.0
    mal_pkts_per_port_max: 5.0
    mal_scan_duration_max: 10
    mal_fail_ratio_min: 0.75

preconditions:
  default:
    name: GlobalBounds
    params:
      lower_bound: 0.0
      upper_bound: 1.0

output:
  root: outputs/3class
