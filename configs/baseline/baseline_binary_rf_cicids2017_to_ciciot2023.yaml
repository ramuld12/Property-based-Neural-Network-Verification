experiment:
  name: baseline_binary_rf_cicids2017_to_ciciot2023
  method: baseline
  task: binary
  seed: 42

data:
  train_path: data/cicids2017_preprocessed.tsv
  cross_eval_path: data/ciciot2023_preprocessed.tsv
  labels: [BENIGN, ATTACK]
  attack_source_labels: [DOS_HTTP_FLOOD, PORTSCAN]
  test_size: 0.3
  val_size: 0.2

model:
  type: random_forest
  n_estimators: 200
  n_jobs: -1

output:
  root: outputs/runs/baseline
