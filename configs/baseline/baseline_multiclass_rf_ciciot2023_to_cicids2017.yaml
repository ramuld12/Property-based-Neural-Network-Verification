experiment:
  name: baseline_multiclass_rf_ciciot2023_to_cicids2017
  method: baseline
  task: multiclass
  seed: 42

data:
  train_path: data/ciciot2023_preprocessed.tsv
  cross_eval_path: data/cicids2017_preprocessed.tsv
  labels: [BENIGN, DOS_HTTP_FLOOD, PORTSCAN]
  test_size: 0.3
  val_size: 0.2

model:
  type: random_forest
  n_estimators: 100
  n_jobs: -1

output:
  root: outputs/runs/baseline
