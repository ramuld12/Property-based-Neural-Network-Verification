experiment:
  name: rf_cicids2017_to_ciciot2023
  task: multiclass
  seed: 42

data:
  train_path: data/cicids2017_preprocessed.tsv
  cross_eval_path: 
    - data/ciciot2023_preprocessed_small_good.tsv
    - data/ciciot2023_preprocessed_small_bad.tsv
  labels: [BENIGN, DOS_HTTP_FLOOD, PORTSCAN]
  test_size: 0.3
  val_size: 0.2
  windows_seconds: 5.0

model:
  type: random_forest
  n_estimators: 200
  n_jobs: -1

output:
  root: outputs/baselines/ex3/rf/
