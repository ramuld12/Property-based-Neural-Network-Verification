experiment:
  name: baseline_multiclass_mlp_ciciot2023_to_cicids2017
  method: baseline
  task: multiclass
  seed: 42

data:
  train_path: data/ciciot2023_preprocessed.tsv
  cross_eval_path: data/cicids2017_preprocessed.tsv
  labels: [BENIGN, DOS_HTTP_FLOOD, PORTSCAN]
  test_size: 0.3
  val_size: 0.2

model:
  type: mlp
  batch_size: 1024
  learning_rate: 0.001
  epochs: 50
  patience: 5
  min_delta: 0.0001

output:
  root: outputs/runs/baseline
