experiment:
  name: mlp_ciciot2023_to_cicids2017
  method: baseline
  task: multiclass
  seed: 42

data:
  train_path: data/ciciot2023_preprocessed.tsv
  cross_eval_path: data/cicids2017_preprocessed.tsv
  labels: [BENIGN, DOS_HTTP_FLOOD, PORTSCAN, ATTACK]
  attack_source_labels: [XSS, SQL_INJECTION, BRUTE_FORCE]
  test_size: 0.3
  val_size: 0.2
  windows_seconds: 5.0

model:
  type: mlp
  batch_size: 2048
  learning_rate: 0.001
  epochs: 40
  patience: 10
  min_delta: 0.00001

output:
  root: outputs/ex4/baseline/mlp_ciciot2023_to_cicids2017
